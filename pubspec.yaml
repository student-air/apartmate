name: apartmate
description: "A new Flutter project."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cached_network_image: ^3.4.1
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.4
  # firebase_storage: ^13.4.3
  flutter_svg: ^2.3.0
  google_fonts: ^8.1.0
  lottie: ^3.5.1
  shimmer: ^3.0.0
  get: ^4.6.6
  intl: ^0.20.2
  image_picker: ^1.2.3
  cupertino_icons: ^1.0.6
  flutter_lucide: ^1.11.0
  country_state_city_picker: ^2.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"