name: apartmate
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.4
  firebase_storage: ^13.4.3
  flutter:
    sdk: flutter
  flutter_form_builder: ^10.3.0+2
  flutter_riverpod: ^3.3.2
  flutter_svg: ^2.3.0
  form_builder_validators: ^11.3.0
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  lottie: ^3.5.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

dependencies:
  flutter:
    sdk: flutter

  get: ^4.6.6                    # GetX — state management, DI, routing
  google_fonts: ^6.2.1           # Inter font (matches the mockup's font-family)
  lucide_icons: ^0.257.0         # icon set matching the mockup's lucide-react icons
  intl: ^0.19.0                  # date/number formatting (used later in dashboard/notices)
  image_picker: ^1.1.2           # owner photo picker on Society Register screen
  cupertino_icons: ^1.0.6        # default Flutter icon pack (comes with every project)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0          # recommended lint rules